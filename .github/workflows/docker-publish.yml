# Build the feishu-claude-agent image and publish it to GitHub Container
# Registry (ghcr.io). Consumers can then `docker compose pull` instead of
# `docker compose up --build`, cutting install time from ~5-10 min to <1 min.
#
# Security posture:
#   - Only the auto-generated GITHUB_TOKEN is used (packages: write). No user
#     secrets, no build-args, nothing sensitive passed into the build.
#   - The .dockerignore whitelist sends only agent_runner.py +
#     agent_runner_opencode.py to the daemon, so no repo file other than those
#     two (both secret-free) can ever enter an image layer.
#   - The Dockerfile itself bakes in no credentials.
name: Build and publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/feishu-claude-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Derive image tags
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
