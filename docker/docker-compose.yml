services:
  agent:
    # Keep `build:` so `cli.py up` (which always passes --build) still builds
    # locally and tags the result as `image:` below. `docker compose pull`
    # separately fetches the published registry image. This preserves the
    # existing local-build workflow while enabling prebuilt-image pulls.
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ghcr.io/ly8427/feishu-claude-agent:latest
    container_name: feishu-claude-agent
    # No published ports: the container is reached only via `docker exec`.
    # No network access needed beyond Anthropic API (default bridge is fine;
    # tighten with `network_mode` if you want to lock egress further).
    # Secrets are NOT baked into the container env (S5): baked vars sit in PID1's
    # /proc/1/environ for the whole container lifetime, readable by the agent via
    # an auto-approved Read. bridge.py injects per-turn, per-provider auth through
    # `docker exec -e` instead. Only non-secret operational defaults live here.
    environment:
      OPENCODE_API_URL: ${OPENCODE_API_URL:-https://open.bigmodel.cn/api/coding/paas/v4}
      OPENCODE_MODEL: ${OPENCODE_MODEL:-zhipuai-coding-plan/glm-5.2}
    # S3 hardening: drop root + all Linux capabilities, block privilege
    # escalation, and cap pids/memory so a runaway agent can't exhaust the host.
    # uid 1000 matches the typical host workspace owner so the bind mount stays
    # writable (the agent user is created with uid 1000 in the Dockerfile).
    user: "1000:1000"
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 512
    mem_limit: 4g
    volumes:
      # The ONLY host path the agent can see. Read-write inside this dir only.
      # ⚠️ Do NOT point WORKSPACE_DIR at a directory that contains this bridge's
      # own source — the agent could then rewrite host-executed code (see S2).
      - ${WORKSPACE_DIR}:${WORKSPACE_DIR}
      # OpenCode provider credentials (auth.json from opencode auth login).
      # Mounted read-only under the non-root agent's HOME so the opencode engine
      # can read it. Path is configurable; defaults to ~/.local/share/opencode.
      - ${OPENCODE_AUTH_FILE:-~/.local/share/opencode/auth.json}:/home/agent/.local/share/opencode/auth.json:ro
    working_dir: ${WORKSPACE_DIR}
    restart: unless-stopped
    command: ["sleep", "infinity"]
